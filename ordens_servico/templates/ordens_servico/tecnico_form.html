{% extends "base.html" %}
{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<div class="page-header">
  <h1><i class="bi bi-people"></i> {{ titulo }}</h1>
  <a href="{% url 'ordens_servico:tecnicos' %}" class="btn-secondary">
    <i class="bi bi-arrow-left"></i> Voltar
  </a>
</div>

<div class="card" style="max-width: 600px;">
  <div class="card-body">
    <form method="post" novalidate>
      {% csrf_token %}
      {% for field in form %}
      <div class="form-group">
        <label for="{{ field.id_for_label }}">{{ field.label }}{% if field.field.required %} <span class="obrigatorio">*</span>{% endif %}</label>
        {{ field }}
        {% if field.errors %}<div class="form-error">{% for e in field.errors %}{{ e }}{% endfor %}</div>{% endif %}
      </div>
      {% endfor %}
      <div class="d-flex gap-2" style="margin-top: 16px;">
        <button type="submit" class="btn-primary">
          <i class="bi bi-check-lg"></i> {{ acao }}
        </button>
        <a href="{% url 'ordens_servico:tecnicos' %}" class="btn-secondary">
          <i class="bi bi-x"></i> Cancelar
        </a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
