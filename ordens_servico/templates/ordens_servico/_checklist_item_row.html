<tr id="checklist-item-{{ item.pk }}">
  <td style="width: 36px; text-align: center; vertical-align: middle;">
    {% if os_obj.status != 'concluida' and os_obj.status != 'faturada' %}
    <form method="post"
          action="{% url 'ordens_servico:toggle_checklist' os_obj.pk item.pk %}"
          hx-post="{% url 'ordens_servico:toggle_checklist' os_obj.pk item.pk %}"
          hx-target="#checklist-item-{{ item.pk }}"
          hx-swap="outerHTML"
          style="display: inline;">
      {% csrf_token %}
      <button type="submit" style="background: none; border: none; cursor: pointer; padding: 0; line-height: 1;" title="Alternar item">
        {% if item.concluido %}
          <i class="bi bi-check-circle-fill" style="color: var(--verde); font-size: 18px;"></i>
        {% else %}
          <i class="bi bi-circle" style="color: var(--texto-off); font-size: 18px;"></i>
        {% endif %}
      </button>
    </form>
    {% else %}
      {% if item.concluido %}
        <i class="bi bi-check-circle-fill" style="color: var(--verde); font-size: 18px;"></i>
      {% else %}
        <i class="bi bi-circle" style="color: var(--texto-off); font-size: 18px;"></i>
      {% endif %}
    {% endif %}
  </td>
  <td style="vertical-align: middle; {% if item.concluido %}text-decoration: line-through; color: var(--texto-corpo);{% endif %}">
    {{ item.descricao }}
    {% if item.observacao %}
    <div style="font-size: 12px; color: var(--texto-corpo); font-style: italic;">{{ item.observacao }}</div>
    {% endif %}
  </td>
</tr>
